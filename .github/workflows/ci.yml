name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: atm
          POSTGRES_PASSWORD: atm
          POSTGRES_DB: atm
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U atm -d atm"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install protoc plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1

      - name: Generate proto
        run: |
          sudo apt-get update && sudo apt-get install -y protobuf-compiler
          protoc -I api/proto --go_out=api/gen --go_opt=paths=source_relative \
            --go-grpc_out=api/gen --go-grpc_opt=paths=source_relative \
            api/proto/temporal/v1/temporal.proto

      - name: Build
        run: go build ./...

      - name: Test
        env:
          DATABASE_URL: postgres://atm:atm@localhost:5432/atm?sslmode=disable
          REDIS_URL: redis://localhost:6379/0
        run: go test ./... -count=1

      - name: Benchmark
        run: go test ./... -bench=. -benchmem -run=^$ -count=1
