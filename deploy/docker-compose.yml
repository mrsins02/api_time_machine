services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: atm
      POSTGRES_PASSWORD: atm
      POSTGRES_DB: atm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atm -d atm"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  nats:
    image: nats:2-alpine
    ports:
      - "4222:4222"
    command: ["-js"]

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      HTTP_ADDR: ":8080"
      GRPC_ADDR: ":9090"
      DATABASE_URL: postgres://atm:atm@postgres:5432/atm?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
      NATS_TOPIC: atm.events
      MIGRATE_ON_START: "true"
      SNAPSHOT_EVERY: "50"
      WORKERS_ENABLED: "true"
      JWT_SECRET: dev-secret-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started

volumes:
  pgdata:
